name: 🔍 Security & Bug Scan

on:
  # Run on every push to main/master and on all pull requests
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Also run on a schedule — every Monday at 08:00 UTC
  schedule:
    - cron: '0 8 * * 1'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required for CodeQL and SARIF uploads
  actions: read
  pull-requests: write     # Allows posting review comments on PRs

jobs:

  # ────────────────────────────────────────────────────────────
  # JOB 1 — Dependency vulnerability scan (npm audit)
  # Catches known CVEs in your package dependencies
  # ────────────────────────────────────────────────────────────
  dependency-audit:
    name: 📦 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline
        # npm ci is stricter than npm install — fails on lockfile mismatches

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > audit-report.json || true
          # Print human-readable summary to the log
          npm audit --audit-level=moderate || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # JOB 2 — Static code analysis with ESLint
  # Catches JS bugs, unsafe patterns, and code quality issues
  # ────────────────────────────────────────────────────────────
  eslint:
    name: 🐛 ESLint Bug Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install ESLint if not in package.json
        run: |
          if ! npx eslint --version > /dev/null 2>&1; then
            npm install --save-dev eslint @eslint/js eslint-plugin-security
          fi

      - name: Create ESLint config if missing
        run: |
          if [ ! -f "eslint.config.js" ] && [ ! -f ".eslintrc.js" ] && [ ! -f ".eslintrc.json" ]; then
            cat > eslint.config.js << 'EOF'
          import js from "@eslint/js";
          import security from "eslint-plugin-security";

          export default [
            js.configs.recommended,
            security.configs.recommended,
            {
              rules: {
                // Bugs
                "no-undef": "error",
                "no-unused-vars": "warn",
                "no-unreachable": "error",
                "no-constant-condition": "error",
                "no-duplicate-case": "error",
                "no-self-assign": "error",
                "no-self-compare": "error",
                "use-isnan": "error",
                "valid-typeof": "error",
                "eqeqeq": ["error", "always"],
                "no-fallthrough": "error",
                "no-implicit-globals": "error",
                // Security
                "no-eval": "error",
                "no-implied-eval": "error",
                "no-new-func": "error",
                "no-script-url": "error",
              }
            }
          ];
          EOF
          fi

      - name: Run ESLint
        run: |
          npx eslint . \
            --ext .js,.jsx,.ts,.tsx \
            --format json \
            --output-file eslint-report.json || true
          # Also print to log
          npx eslint . --ext .js,.jsx,.ts,.tsx || true

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # JOB 3 — Secret / credential leak detection
  # Catches API keys, passwords, tokens committed to the repo
  # ────────────────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed to scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set to "warn" to avoid failing the build, "error" to block merges
          GITLEAKS_ENABLE_COMMENTS: true

      # Custom patterns specific to this project
      - name: Scan for hardcoded Google API keys
        run: |
          echo "Scanning for exposed API keys..."
          if grep -rn "AIzaSy" --include="*.js" --include="*.html" --include="*.ts" .; then
            echo "::error::⚠️  Google API key found hardcoded in source files!"
            echo "::error::Move it to an environment variable or backend endpoint."
            exit 1
          else
            echo "✅ No hardcoded Google API keys found."
          fi

      - name: Scan for hardcoded passwords
        run: |
          # Look for common password assignment patterns
          if grep -rEn "(password|passwd|pwd)\s*[=:]\s*['\"][^'\"]{4,}" \
            --include="*.js" --include="*.ts" \
            --exclude-dir=node_modules \
            --exclude-dir=.git .; then
            echo "::warning::Possible hardcoded password detected — review the matches above."
          else
            echo "✅ No obvious hardcoded passwords found."
          fi

  # ────────────────────────────────────────────────────────────
  # JOB 4 — GitHub CodeQL deep security analysis
  # Finds injection flaws, XSS, prototype pollution, and more
  # ────────────────────────────────────────────────────────────
  codeql:
    name: 🔬 CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript   # Also supports: python, java, go, cpp, csharp, ruby
          queries: security-and-quality
          # 'security-and-quality' runs both security AND bug-detection queries

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
          # Results appear in GitHub → Security → Code scanning alerts

  # ────────────────────────────────────────────────────────────
  # JOB 5 — HTML validation
  # Catches broken markup, missing attributes, accessibility issues
  # ────────────────────────────────────────────────────────────
  html-validate:
    name: 🌐 HTML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Create html-validate config
        run: |
          cat > .htmlvalidate.json << 'EOF'
          {
            "extends": ["html-validate:recommended"],
            "rules": {
              "no-inline-style": "warn",
              "require-sri": "warn",
              "script-type": "error",
              "no-dup-id": "error",
              "void-content": "error",
              "attr-quotes": "error",
              "wcag/h30": "warn",
              "wcag/h37": "warn"
            },
            "elements": ["html5"]
          }
          EOF

      - name: Run HTML validation
        run: |
          html-validate "**/*.html" \
            --formatter stylish || true
          # Also output JSON for artifact
          html-validate "**/*.html" \
            --formatter json > html-report.json || true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-validation-report
          path: html-report.json
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # JOB 6 — Summary comment on Pull Requests
  # Posts a combined pass/fail summary as a PR review comment
  # ────────────────────────────────────────────────────────────
  pr-summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, eslint, secret-scan, html-validate]
    if: github.event_name == 'pull_request'
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary = '## 🔍 Security & Bug Scan Results\n\n';
            summary += '| Check | Status |\n|-------|--------|\n';

            const jobs = [
              { name: '📦 Dependency Audit', artifact: 'npm-audit-report/audit-report.json', field: 'metadata.vulnerabilities' },
              { name: '🐛 ESLint',           artifact: 'eslint-report/eslint-report.json',   field: null },
              { name: '🌐 HTML Validation',  artifact: 'html-validation-report/html-report.json', field: null },
            ];

            for (const job of jobs) {
              let status = '✅ Passed';
              try {
                const data = JSON.parse(fs.readFileSync(job.artifact, 'utf8'));
                // Basic heuristic: non-empty results array = issues found
                const hasIssues = Array.isArray(data)
                  ? data.some(f => f.errorCount > 0 || f.warningCount > 0)
                  : (data?.metadata?.vulnerabilities?.total > 0);
                if (hasIssues) status = '⚠️ Issues found — see artifacts';
              } catch (e) {
                status = '❓ Report unavailable';
              }
              summary += `| ${job.name} | ${status} |\n`;
            }

            summary += '\n> 💡 Download the full reports from the **Artifacts** section of this workflow run.\n';
            summary += '> 🔬 CodeQL results appear in **Security → Code scanning alerts**.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
